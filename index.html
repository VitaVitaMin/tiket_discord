<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUST RECRUITMENT TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap');

        :root {
            --rust-red: #ce3f2b;
            --rust-dark: #0d0d0d;
            --rust-panel: #1a1a1a;
            --rust-input: #050505;
            --rust-text: #888;
            --rust-border: #2a2a2a;
            --rust-glow: rgba(206, 63, 43, 0.3);
        }

        body {
            background-color: var(--rust-dark);
            background-image: radial-gradient(circle at 2px 2px, #222 1px, transparent 0);
            background-size: 24px 24px;
            color: #fff;
            font-family: 'Roboto Condensed', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-container {
            background-color: var(--rust-panel);
            background-image: linear-gradient(135deg, rgba(255,255,255,0.01) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.01) 50%, rgba(255,255,255,0.01) 75%, transparent 75%, transparent);
            background-size: 40px 40px;
            width: 100%;
            max-width: 600px;
            padding: 50px;
            border: 1px solid var(--rust-border);
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,1);
        }

        .terminal-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #333;
            overflow: hidden;
        }

        .terminal-line {
            height: 100%;
            width: 30%;
            background: var(--rust-red);
            box-shadow: 0 0 10px var(--rust-red);
            animation: scan 3s infinite linear;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 42px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 40px 0;
            color: #fff;
        }

        .section {
            margin-bottom: 40px;
            border-left: 2px solid #222;
            padding-left: 20px;
        }

        .section-header {
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--rust-red);
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .field { margin-bottom: 22px; }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--rust-text);
            font-weight: 700;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            background-color: var(--rust-input);
            border: 1px solid var(--rust-border);
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--rust-red);
            box-shadow: 0 0 15px var(--rust-glow);
        }

        .rules-wrapper {
            margin: 40px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--rust-border);
            padding: 30px;
            text-align: center;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
        }

        .checkbox-container input {
            width: 26px;
            height: 26px;
            accent-color: var(--rust-red);
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: var(--rust-red);
            color: #fff;
            border: none;
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        button:hover { background-color: #e64a35; }
        button:disabled { background-color: #444; cursor: not-allowed; }

        #status {
            display: none;
            margin-top: 30px;
            padding: 20px;
            text-align: center;
            font-family: 'Oswald', sans-serif;
        }
        
        .success { color: #43b581; border: 1px solid #43b581; }
        .error { color: var(--rust-red); border: 1px solid var(--rust-red); }
    </style>
</head>
<body>

<div class="form-container">
    <div class="terminal-header"><div class="terminal-line"></div></div>
    <h2>RECRUITMENT TERMINAL</h2>
    
    <form id="rustForm">
        <div class="section">
            <div class="section-header">01 ЛИЧНЫЕ ДАННЫЕ</div>
            <div class="grid">
                <div class="field">
                    <label>Имя / Позывной</label>
                    <input type="text" name="Имя_Ник" required>
                </div>
                <div class="field">
                    <label>Возраст</label>
                    <input type="number" name="Возраст" required>
                </div>
            </div>
            <div class="field">
                <label>Страна / Пояс</label>
                <input type="text" name="Локация" required>
            </div>
        </div>

        <div class="section">
            <div class="section-header">02 ИГРОВОЙ ПРОФИЛЬ</div>
            <div class="field">
                <label>Steam Profile URL</label>
                <input type="url" name="Steam_Ссылка" required>
            </div>
            <div class="grid">
                <div class="field">
                    <label>Часы в Rust</label>
                    <input type="number" name="Часы" required>
                </div>
                <div class="field">
                    <label>Онлайн в день</label>
                    <input type="text" name="Онлайн" required>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">03 ХАРАКТЕРИСТИКИ</div>
            <div class="field">
                <label>Предпочтительная роль</label>
                <select name="Роль">
                    <option>Комбат</option>
                    <option>Билдер(запас)</option>
                    <option>Фермер</option>
                    <option>Фармер</option>
                    <option>Электрик(запас)</option>
                </select>
            </div>
            <div class="field">
                <label>Стрельба (Оружие/Дистанция)</label>
                <input type="text" name="Навыки_Оружия" required>
            </div>
            <div class="field">
                <label>Опыт в кланах</label>
                <textarea name="История_Кланов" rows="3" required></textarea>
            </div>
        </div>

        <div class="rules-wrapper">
            <label class="checkbox-container">
                <input type="checkbox" name="Правила_Приняты" value="Да" required>
                ПОДТВЕРЖДАЮ ЛИЧНОСТЬ
            </label>
        </div>

        <button type="submit" id="submitBtn">ОТПРАВИТЬ ДАННЫЕ</button>
        <div id="status"></div>
    </form>
</div>

<script>
    const form = document.getElementById("rustForm");
    const status = document.getElementById("status");
    const btn = document.getElementById("submitBtn");

    form.addEventListener("submit", function(e) {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "ОТПРАВКА...";
        
        fetch("https://formspree.io/f/mgorwppo", {
            method: "POST",
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
        }).then(res => {
            if (res.ok) {
                status.innerHTML = "ДАННЫЕ ПРИНЯТЫ. ТИКЕТ БУДЕТ РАССМОТРЕН В БЛИЖАЙШЕЕ ВРЕМЯ.";
                status.className = "success";
                status.style.display = "block";
                form.reset();
                btn.style.display = "none";
            } else {
                throw new Error();
            }
        }).catch(() => {
            status.innerHTML = "ОШИБКА. ПРОВЕРЬТЕ СОЕДИНЕНИЕ.";
            status.className = "error";
            status.style.display = "block";
            btn.disabled = false;
            btn.innerText = "ОТПРАВИТЬ ДАННЫЕ";
        });
    });
</script>

</body>
</html>
