<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULFUR — Ticket System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        /* ТЕМЫ ОФОРМЛЕНИЯ */
        :root[data-theme="light"] {
            --bg-main: #ffffff;
            --bg-panel: #fafafa;
            --border-color: #e4e4e7;
            --text-main: #09090b;
            --text-muted: #71717a;
            --rust: #b53a1c;
            --rust-hover: #942e14;
            --yellow: #df9f00;
            --bg-input: #ffffff;
            --shadow: rgba(0, 0, 0, 0.02);
            --focus-ring: rgba(181, 58, 28, 0.15);
            --bg-glow: rgba(181, 58, 28, 0.03);
            --font-scale: 1;
            --border-width: 1px;
        }

        :root[data-theme="dark"] {
            --bg-main: #0d0d11;
            --bg-panel: #16161e;
            --border-color: #27273a;
            --text-main: #f4f4f7;
            --text-muted: #8e8e9f;
            --rust: #e04e2b;
            --rust-hover: #ff623d;
            --yellow: #ffb700;
            --bg-input: #111116;
            --shadow: rgba(0, 0, 0, 0.2);
            --focus-ring: rgba(224, 78, 43, 0.25);
            --bg-glow: rgba(224, 78, 43, 0.04);
            --font-scale: 1;
            --border-width: 1px;
        }

        :root[data-theme="accessible"] {
            --bg-main: #ffffff;
            --bg-panel: #ffffff;
            --border-color: #000000;
            --text-main: #000000;
            --text-muted: #000000;
            --rust: #000000;
            --rust-hover: #333333;
            --yellow: #000000;
            --bg-input: #ffffff;
            --shadow: none;
            --focus-ring: transparent;
            --bg-glow: transparent;
            --font-scale: 1.2;
            --border-width: 2px;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--bg-glow), transparent 50%);
            pointer-events: none;
        }

        /* КНОПКА СМЕНЫ ТЕМЫ (СОЛНЦЕ / ЛУНА) */
        .theme-toggle-btn {
            background: var(--bg-input);
            border: var(--border-width) solid var(--border-color);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background-color 0.15s, border-color 0.15s;
        }
        .theme-toggle-btn:hover {
            border-color: var(--text-main);
        }
        .theme-toggle-btn .icon {
            width: 18px;
            height: 18px;
            position: relative;
            border-radius: 50%;
        }
        
        [data-theme="light"] .theme-toggle-btn .icon {
            background: transparent;
            box-shadow: 0 0 0 2px var(--text-main), 5px -5px 0 -1px var(--bg-input);
            transform: translate(-3px, 3px);
            border-radius: 50%;
        }
        [data-theme="dark"] .theme-toggle-btn .icon {
            background: var(--yellow);
            border-radius: 50%;
        }
        [data-theme="dark"] .theme-toggle-btn .icon::before {
            content: ''; position: absolute; top: -4px; left: 7px; width: 4px; height: 26px; background: var(--yellow); border-radius: 2px; transform: rotate(45deg);
        }

        /* ФИКСИРОВАННАЯ КНОПКА ДЛЯ СЛАБОВИДЯЩИХ (СПРАВА СНИЗУ) */
        .accessible-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 999;
            background: var(--bg-panel);
            border: var(--border-width) solid var(--border-color);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--shadow);
            width: auto;
            transition: all 0.15s ease;
        }
        .accessible-toggle:hover {
            border-color: var(--rust);
            background: var(--bg-main);
        }
        .accessible-toggle.active {
            background: #000000;
            color: #ffffff;
            border-color: #000000;
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; padding: 20px;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .modal-overlay.hidden {
            opacity: 0; transform: translateY(5px); pointer-events: none;
        }

        .modal-content {
            max-width: 380px; width: 100%; padding: 32px;
            background: var(--bg-panel); 
            border: var(--border-width) solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 8px 30px var(--shadow);
        }

        .modal-content h3 {
            font-size: calc(18px * var(--font-scale)); font-weight: 600; margin: 0 0 6px 0;
            letter-spacing: -0.3px;
        }
        
        .modal-content p { color: var(--text-muted); font-size: calc(13px * var(--font-scale)); line-height: 1.4; margin: 0 0 20px 0; }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .main-container {
            width: 100%; max-width: 750px; background: var(--bg-panel);
            border: var(--border-width) solid var(--border-color); border-radius: 8px; z-index: 5; opacity: 0;
            transform: translateY(10px); transition: opacity 0.3s ease, transform 0.3s ease, background-color 0.2s, border-color 0.2s;
            padding: 40px; box-shadow: 0 4px 24px var(--shadow);
        }

        .main-container.active { opacity: 1; transform: translateY(0); }

        /* ШАПКА КЛАНА */
        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px; padding-bottom: 20px; border-bottom: var(--border-width) solid var(--border-color);
        }
        
        .form-header h2 { 
            font-size: calc(22px * var(--font-scale)); font-weight: 600; margin: 0; 
            letter-spacing: -0.5px; 
        }

        /* СЕКЦИИ */
        .section { margin-bottom: 28px; }
        .section-title {
            font-size: calc(12px * var(--font-scale)); font-weight: 600; text-transform: uppercase;
            color: var(--text-main); letter-spacing: 0.5px; margin-bottom: 16px;
            border-left: 2px solid var(--rust); padding-left: 8px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .full-width { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .row { margin-bottom: 16px; }
        .field { position: relative; }

        label { display: block; margin-bottom: 6px; font-size: calc(12px * var(--font-scale)); color: var(--text-main); font-weight: 500; }

        input, select, textarea {
            width: 100%; padding: 10px 12px; background-color: var(--bg-input);
            border: var(--border-width) solid var(--border-color); color: var(--text-main); font-size: calc(14px * var(--font-scale));
            outline: none; border-radius: 6px; transition: border-color 0.12s, box-shadow 0.12s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--rust);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .invalid-field, .invalid-field:focus { border-color: #dc2626 !important; box-shadow: none !important; }
        .error-text { color: #dc2626; font-size: 12px; margin-top: 4px; display: none; }
        textarea { resize: vertical; }

        .rules-wrapper { margin: 24px 0; padding: 14px; background: var(--bg-input); border: var(--border-width) solid var(--border-color); border-radius: 6px; }
        .checkbox-container { display: flex; align-items: center; gap: 10px; font-size: calc(13px * var(--font-scale)); color: var(--text-muted); }
        .checkbox-container input { width: 16px; height: 16px; accent-color: var(--rust); cursor: pointer; margin: 0; }

        /* КНОПКИ ОТПРАВКИ */
        button[type="submit"], #dcBtn {
            width: 100%; padding: 12px; background-color: var(--rust); color: #ffffff;
            border: 1px solid transparent; font-size: calc(14px * var(--font-scale)); font-weight: 500;
            border-radius: 6px; cursor: pointer; transition: background-color 0.12s, color 0.12s;
        }
        button[type="submit"]:hover, #dcBtn:hover { 
            background-color: var(--rust-hover); 
            color: #ffffff;
        }
        button:disabled { background-color: var(--border-color); color: var(--text-muted); cursor: not-allowed; }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; gap: 14px; }
            .main-container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="bg-gradient" id="ambientBg"></div>

<!-- ФИКСИРОВАННЫЙ ОРГАН УПРАВЛЕНИЯ ДОСТУПНОСТЬЮ -->
<button class="accessible-toggle" id="accessBtn" onclick="toggleAccessibility()">Версия для слабовидящих</button>

<!-- АВТОРИЗАЦИЯ DISCORD -->
<div class="modal-overlay" id="discordAuth">
    <div class="modal-content">
        <h3>Вход в систему</h3>
        <p>Укажите ваш логин Discord для продолжения.</p>
        <div class="field">
            <label>Имя пользователя Discord</label>
            <input type="text" id="dcInput" placeholder="username" autocomplete="off" spellcheck="false">
            <div class="error-text" id="dcErrorText">Некорректный формат аккаунта.</div>
        </div>
        <button type="button" id="dcBtn" style="margin-top: 16px;">Продолжить</button>
    </div>
</div>

<!-- ОСНОВНАЯ ПАНЕЛЬ TICKET -->
<div class="main-container" id="mainTerminal">
    <div class="form-header">
        <h2>Clan Sulfur Ticket</h2>
        
        <!-- КНОПКА СМЕНЫ ТЕМЫ -->
        <button class="theme-toggle-btn" onclick="toggleTheme()" title="Переключить тему">
            <div class="icon"></div>
        </button>
    </div>
    
    <form id="rustForm" novalidate>
        <input type="hidden" name="Discord_Идентификатор" id="hiddenDiscord">

        <div class="section">
            <div class="section-title">Основная информация</div>
            <div class="grid-2">
                <div class="field">
                    <label>Имя или никнейм</label>
                    <input type="text" name="Имя_Ник" required autocomplete="off" placeholder="Ваш ник">
                </div>
                <div class="field">
                    <label>Возраст</label>
                    <input type="number" name="Возраст" id="ageInput" required min="14" max="50" placeholder="Полных лет">
                    <div class="error-text">Допустимый диапазон: 14 - 50 лет.</div>
                </div>
            </div>
            <div class="row" style="margin-top: 16px;">
                <div class="field full-width">
                    <label>Город / Часовой пояс</label>
                    <input type="text" name="Локация" required autocomplete="off" placeholder="Пример: Москва (МСК)">
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Игровой профиль</div>
            <div class="row">
                <div class="field full-width">
                    <label>Ссылка на Steam</label>
                    <input type="url" name="Steam_Ссылка" id="steamInput" required autocomplete="off" placeholder="https://steamcommunity.com/id/...">
                    <div class="error-text">Неверный формат ссылки.</div>
                </div>
            </div>
            <div class="grid-2">
                <div class="field">
                    <label>Часы в Rust</label>
                    <input type="number" name="Часы" id="hoursInput" required min="1" placeholder="Общее количество часов">
                    <div class="error-text">Введите корректное число.</div>
                </div>
                <div class="field">
                    <label>Ежедневный онлайн</label>
                    <input type="text" name="Онлайн" required placeholder="Пример: 5 часов в день">
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Специализация и опыт</div>
            <div class="grid-2" style="margin-bottom: 16px;">
                <div class="field">
                    <label>Основная роль</label>
                    <select name="Роль">
                        <option value="Комбат">Combat (Штурмовик)</option>
                        <option value="Билдер">Builder (Строитель)</option>
                        <option value="Фермер">Farmer (Обеспечение)</option>
                        <option value="Фармер">Miner (Добыча)</option>
                        <option value="Электрик">Electric (Индустрия)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Предпочитаемое оружие</label>
                    <input type="text" name="Навыки_Оружия" required placeholder="Пример: АК-47, MP5">
                </div>
            </div>
            <div class="row">
                <div class="field full-width">
                    <label>Прошлые команды и причины ухода</label>
                    <textarea name="История_Кланов" rows="3" required placeholder="Напишите краткую историю вашего опыта в других кланах."></textarea>
                </div>
            </div>
        </div>

        <div class="rules-wrapper">
            <label class="checkbox-container">
                <input type="checkbox" required>
                Указанные данные являются верными и актуальными.
            </label>
        </div>

        <button type="submit" id="submitBtn">Отправить тикет</button>
    </form>
</div>

<script>
    const API_URL = "https://example.com/api/ticket";

    // УПРАВЛЕНИЕ ТЕМАМИ С УЧЕТОМ СИСТЕМНЫХ НАСТРОЕК
    function applyTheme(themeName) {
        document.documentElement.setAttribute('data-theme', themeName);
        if (themeName !== 'accessible') {
            localStorage.setItem('sulfur_theme', themeName);
            document.getElementById('accessBtn').classList.remove('active');
        }
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        if (currentTheme === 'accessible') return;
        
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        applyTheme(newTheme);
    }

    function toggleAccessibility() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const accessBtn = document.getElementById('accessBtn');
        
        if (currentTheme === 'accessible') {
            // Возвращаем сохраненную ручную тему или определяем системную заново
            const savedTheme = localStorage.getItem('sulfur_theme');
            if (savedTheme) {
                applyTheme(savedTheme);
            } else {
                const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                applyTheme(systemPrefersDark ? 'dark' : 'light');
            }
            accessBtn.classList.remove('active');
        } else {
            document.documentElement.setAttribute('data-theme', 'accessible');
            accessBtn.classList.add('active');
        }
    }

    // Инициализация: Проверяем localStorage -> Проверяем систему
    const savedTheme = localStorage.getItem('sulfur_theme');
    if (savedTheme) {
        applyTheme(savedTheme);
    } else {
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(systemPrefersDark ? 'dark' : 'light');
    }

    // СЛЕДОВАНИЕ ФОНА ЗА КУРСОРOM
    const bg = document.getElementById('ambientBg');
    window.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth) * 100;
        const y = (e.clientY / window.innerHeight) * 100;
        bg.style.setProperty('--mouse-x', `${x}%`);
        bg.style.setProperty('--mouse-y', `${y}%`);
    });

    // МОДАЛКА DISCORD
    const modal = document.getElementById("discordAuth");
    const dcInput = document.getElementById("dcInput");
    const dcBtn = document.getElementById("dcBtn");
    const dcError = document.getElementById("dcErrorText");
    const terminal = document.getElementById("mainTerminal");
    const form = document.getElementById("rustForm");
    const hiddenDiscord = document.getElementById("hiddenDiscord");
    const submitBtn = document.getElementById("submitBtn");

    function setCookie(name, value, seconds) {
        const date = new Date(); date.setTime(date.getTime() + (seconds * 1000));
        document.cookie = name + "=" + value + "; expires=" + date.toUTCString() + "; path=/; SameSite=Strict";
    }
    function getCookie(name) {
        const matches = document.cookie.match(new RegExp("(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"));
        return matches ? decodeURIComponent(matches[1]) : undefined;
    }

    window.addEventListener("DOMContentLoaded", () => {
        dcInput.focus();
        if (getCookie("sulfur_gate_cooldown")) {
            submitBtn.disabled = true; submitBtn.innerText = "Доступ заблокирован (15 мин)";
        }
    });

    dcInput.addEventListener("input", () => { dcInput.value = dcInput.value.toLowerCase().replace(/\s+/g, ''); });

    function checkDiscordAuth() {
        let username = dcInput.value.trim();
        if (username.startsWith('@')) username = username.substring(1);
        
        if (/^[a-z0-9_.]{2,32}$/.test(username) && !username.includes('..')) {
            dcError.style.display = "none"; dcInput.classList.remove("invalid-field");
            hiddenDiscord.value = username;
            modal.classList.add("hidden");
            setTimeout(() => { modal.style.display = "none"; terminal.classList.add("active"); }, 200);
        } else {
            dcError.style.display = "block"; dcInput.classList.add("invalid-field");
        }
    }

    dcBtn.addEventListener("click", checkDiscordAuth);
    dcInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); checkDiscordAuth(); } });

    // ВАЛИДАЦИЯ
    const steamInput = document.getElementById("steamInput");
    const ageInput = document.getElementById("ageInput");
    const hoursInput = document.getElementById("hoursInput");

    function showError(inputElement, show) {
        const errorDiv = inputElement.parentElement.querySelector(".error-text");
        if (show) {
            inputElement.classList.add("invalid-field");
            if (errorDiv) errorDiv.style.display = "block";
        } else {
            inputElement.classList.remove("invalid-field");
            if (errorDiv) errorDiv.style.display = "none";
        }
    }

    steamInput.addEventListener("input", () => { showError(steamInput, !/^https:\/\/(www\.)?steamcommunity\.com\/(id|profiles)\/[a-zA-Z0-9_-]+\/?$/.test(steamInput.value.trim())); });
    ageInput.addEventListener("input", () => { const age = parseInt(ageInput.value, 10); showError(ageInput, isNaN(age) || age < 14 || age > 50); });
    hoursInput.addEventListener("input", () => { const hours = parseInt(hoursInput.value, 10); showError(hoursInput, isNaN(hours) || hours < 1); });

    // ОТПРАВКА С ФОРМИРОВАНИЕМ ДАННЫХ
    form.addEventListener("submit", function(e) {
        e.preventDefault();
        if (getCookie("sulfur_gate_cooldown")) return;

        let hasErrors = false;
        if (!/^https:\/\/(www\.)?steamcommunity\.com\/(id|profiles)\/[a-zA-Z0-9_-]+\/?$/.test(steamInput.value.trim())) { showError(steamInput, true); hasErrors = true; }
        const age = parseInt(ageInput.value, 10); if (isNaN(age) || age < 14 || age > 50) { showError(ageInput, true); hasErrors = true; }
        const hours = parseInt(hoursInput.value, 10); if (isNaN(hours) || hours < 1) { showError(hoursInput, true); hasErrors = true; }
        if (!form.checkValidity()) hasErrors = true;

        if (hasErrors) return;

        submitBtn.disabled = true; submitBtn.innerText = "Отправка...";

        fetch(API_URL, {
            method: "POST",
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
        }).then(res => {
            if (res.ok) {
                submitBtn.innerText = "Отправлено";
                form.reset();
                setCookie("sulfur_gate_cooldown", "active", 900);
            } else { throw new Error(); }
        }).catch(() => {
            alert("Ошибка соединения.");
            submitBtn.disabled = false; submitBtn.innerText = "Отправить тикет";
        });
    });
</script>

</body>
</html>
